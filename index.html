<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SVG Canvas Navigator</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0a0a;
      color: #e0e0e0;
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
    }

    #upload-phase {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100vw;
      height: 100vh;
    }

    #drop-zone {
      width: 480px;
      height: 280px;
      border: 2px dashed #333;
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }

    #drop-zone:hover,
    #drop-zone.drag-over {
      border-color: #666;
      background: rgba(255, 255, 255, 0.03);
    }

    #drop-zone .icon { font-size: 48px; opacity: 0.4; }
    #drop-zone .label { font-size: 14px; color: #888; }
    #drop-zone .sublabel { font-size: 11px; color: #555; }

    #file-input { display: none; }

    #progress-container {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      margin-top: 24px;
      width: 480px;
    }

    #progress-bar-bg {
      width: 100%;
      height: 4px;
      background: #1a1a1a;
      border-radius: 2px;
      overflow: hidden;
    }

    #progress-bar-fill {
      width: 0%;
      height: 100%;
      background: #4a9eff;
      border-radius: 2px;
      transition: width 0.3s ease;
    }

    #progress-label { font-size: 11px; color: #666; }

    #canvas-phase {
      display: none;
      width: 100vw;
      height: 100vh;
      position: relative;
    }

    #main-canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      background: #0a0a0a;
    }

    #hud {
      position: fixed;
      top: 12px;
      right: 12px;
      background: rgba(10, 10, 10, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid #222;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 11px;
      line-height: 1.7;
      min-width: 180px;
      z-index: 100;
      pointer-events: none;
      user-select: none;
    }

    #hud .hud-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
    }

    #hud .hud-key { color: #666; }
    #hud .hud-val { color: #ccc; text-align: right; }
    #hud .fps-green { color: #4ade80; }
    #hud .fps-yellow { color: #facc15; }
    #hud .fps-red { color: #f87171; }

    #switch-btn {
      position: fixed;
      top: 12px;
      left: 12px;
      background: rgba(10, 10, 10, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid #222;
      border-radius: 6px;
      padding: 6px 12px;
      font-size: 11px;
      color: #888;
      cursor: pointer;
      z-index: 100;
      font-family: inherit;
      transition: color 0.2s, border-color 0.2s;
    }

    #switch-btn:hover { color: #ccc; border-color: #444; }

    #footer-hint {
      position: fixed;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      color: #444;
      z-index: 100;
      pointer-events: none;
      user-select: none;
    }

    #tooltip {
      position: fixed;
      display: none;
      background: rgba(10, 10, 10, 0.9);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid #333;
      border-radius: 4px;
      padding: 4px 8px;
      font-size: 11px;
      color: #ccc;
      pointer-events: none;
      z-index: 200;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <div id="upload-phase">
    <div id="drop-zone">
      <div class="icon">&#x2B06;</div>
      <div class="label">Arraste um arquivo SVG aqui</div>
      <div class="sublabel">ou clique para selecionar</div>
    </div>
    <input type="file" id="file-input" accept=".svg" />
    <div id="progress-container">
      <div id="progress-bar-bg">
        <div id="progress-bar-fill"></div>
      </div>
      <div id="progress-label">Preparando...</div>
    </div>
  </div>

  <div id="canvas-phase">
    <canvas id="main-canvas"></canvas>
    <button id="switch-btn">&#x21C4; Trocar arquivo</button>
    <div id="hud">
      <div class="hud-row"><span class="hud-key">FPS</span><span class="hud-val" id="hud-fps">--</span></div>
      <div class="hud-row"><span class="hud-key">Level</span><span class="hud-val" id="hud-level">root</span></div>
      <div class="hud-row"><span class="hud-key">Focus</span><span class="hud-val" id="hud-focus">--</span></div>
      <div class="hud-row"><span class="hud-key">Scale</span><span class="hud-val" id="hud-scale">1.00</span></div>
      <div class="hud-row"><span class="hud-key">Regions</span><span class="hud-val" id="hud-regions">0</span></div>
      <div class="hud-row"><span class="hud-key">Loading</span><span class="hud-val" id="hud-loading">--</span></div>
      <div class="hud-row"><span class="hud-key">Tier</span><span class="hud-val" id="hud-tier">--</span></div>
    </div>
    <div id="footer-hint">Click to drill down &middot; Click empty to go back &middot; ESC back &middot; R reset</div>
    <div id="tooltip"></div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
